name: Weekly Broadway Showtimes

# Runs once on Monday at 1am ET. If Playbill hasn't updated yet (the script
# exits 2), the job waits 1 hour and tries again — up to 5 times total.
#
# Manual trigger: Actions → "Weekly Broadway Showtimes" → Run workflow.
# Use "Force write" to bypass the freshness check.

on:
  schedule:
    # 6am UTC = 1am ET (EDT). Playbill typically updates Sunday evening ET.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if weekOf unchanged (bypass freshness check)"
        required: false
        default: "false"
        type: boolean

jobs:
  fetch-showtimes:
    name: Fetch & sync Playbill showtimes to Convex
    runs-on: ubuntu-latest
    # Allow up to 6 hours: 5 retries × 1h sleep + script runtime
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fetch & sync showtimes (with hourly retry)
        id: fetch
        env:
          CONVEX_HTTP_URL: ${{ secrets.CONVEX_HTTP_URL }}
          SHOWTIMES_SYNC_SECRET: ${{ secrets.SHOWTIMES_SYNC_SECRET }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi

          MAX_ATTEMPTS=5
          ATTEMPT=0
          EXIT_CODE=2

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "--- Attempt $ATTEMPT of $MAX_ATTEMPTS ($(date -u)) ---"

            bun scripts/fetchWeeklyShowtimes.mjs $ARGS
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Success on attempt $ATTEMPT."
              break
            elif [ $EXIT_CODE -eq 2 ]; then
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Playbill hasn't updated yet. Waiting 1 hour before retry..."
                sleep 3600
              else
                echo "Playbill never updated after $MAX_ATTEMPTS attempts. Giving up for today."
              fi
            else
              echo "Hard error (exit $EXIT_CODE) — failing immediately."
              exit $EXIT_CODE
            fi
          done

          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=synced" >> $GITHUB_OUTPUT
          else
            echo "status=stale" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.fetch.outputs.status }}" = "stale" ]; then
            echo "### ⚠️ Playbill did not update this week" >> $GITHUB_STEP_SUMMARY
            echo "All attempts returned a stale weekOf. Check manually." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Showtimes synced to Convex" >> $GITHUB_STEP_SUMMARY
          fi
