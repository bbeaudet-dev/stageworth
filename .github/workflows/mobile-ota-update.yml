name: Mobile OTA Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "EAS update channel"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
      message:
        description: "Update message"
        required: true
        default: "OTA update"
        type: string
      branch:
        description: "Git ref to publish from (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string

jobs:
  update:
    name: Publish OTA (${{ inputs.channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish OTA update
        run: npx eas-cli@latest update --channel "${{ inputs.channel }}" --message "${{ inputs.message }}" --non-interactive

      - name: Summary
        run: |
          echo "### OTA update published" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Channel: \`${{ inputs.channel }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Message: \`${{ inputs.message }}\`" >> $GITHUB_STEP_SUMMARY
